hydra:
  run:
    dir: ${oc.env:OUTPUT_DIR,outputs/singlerun/${now:%Y-%m-%d}/${now:%H-%M-%S}}

auto_resume: false

defaults:
  - data_module: omc25_le50_molgraph_strict
  - trainer: default
  - lightning_module: default
  - lightning_module/diffusion_module: csp
  - lightning_module/diffusion_module/model: mattergen_molcsp
  - lightning_module/diffusion_module/corruption: csp
  - _self_

lightning_module:
  diffusion_module:
    corruption:
      sdes:
        cell:
          vpsde_config:
            limit_var_scaling_constant: 0.10
    loss_fn:
      reduce: mean
